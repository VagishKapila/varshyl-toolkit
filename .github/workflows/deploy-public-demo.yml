name: Deploy public-demo to Netlify

on:
  push:
    branches: [main]
    paths:
      - "apps/public-demo/**"
      - "packages/**"
      - ".github/workflows/deploy-public-demo.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: |
          pnpm --filter @varshylinc/auth-social build
          pnpm --filter @varshylinc/mobile-payments build
          pnpm --filter @varshylinc/onboarding-consent-engine build
          pnpm --filter @varshylinc/team-management build

      - name: Build public-demo
        run: pnpm --filter @varshylinc/public-demo build

      - name: Install Playwright package and Chromium
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Start vite preview (background)
        run: pnpm --filter @varshylinc/public-demo preview &

      - name: Wait for preview server
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:4173/ && echo "Server ready" && exit 0
            sleep 2
          done
          echo "Server failed to start" && exit 1

      - name: Capture screenshots
        run: node scripts/take-screenshots.mjs

      - name: Deploy to Netlify (build + screenshots)
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: apps/public-demo/dist
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy public-demo + screenshots from ${{ github.sha }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: 9922fb30-b6ee-4d92-8e61-99f945e8674e

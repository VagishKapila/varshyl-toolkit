name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: varshyl_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/varshyl_test
      TMPDIR: /tmp
      TM_ENCRYPTION_KEY: test-encryption-key-for-ci-only!
      # Prevent pnpm from failing on ${NODE_AUTH_TOKEN} in .npmrc during CI
      # (only the publish job needs a real value)
      NODE_AUTH_TOKEN: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.0

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        # --no-frozen-lockfile allows lockfile updates when new deps are added
        run: pnpm install --no-frozen-lockfile

      - name: Build team-management (required before downstream typecheck)
        run: pnpm --filter @varshylinc/team-management build

      - name: Build onboarding-consent-engine (required before downstream typecheck)
        run: pnpm --filter @varshylinc/onboarding-consent-engine build

      - name: Build auth-social (required before downstream typecheck)
        run: pnpm --filter @varshylinc/auth-social build

      - name: Build mobile-payments (required before downstream typecheck)
        run: pnpm --filter @varshylinc/mobile-payments build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build all
        run: pnpm build

      - name: Test (with Postgres)
        run: pnpm test

      - name: Verify no cross-module imports
        run: bash scripts/verify-no-cross-imports.sh

  # ── Secrets guard ─────────────────────────────────────────────────────────────
  secrets-guard:
    name: Secrets guard (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Detect OCE ────────────────────────────────────────────────────────────────
  # Checks whether packages/onboarding-consent-engine/package.json exists on
  # this branch. Outputs present=true/false. Used to gate smoke-oce so the
  # required check "smoke — onboarding-consent-engine" fires on every PR but
  # skips gracefully when OCE is not yet present — GitHub treats skipped as
  # satisfied for required checks.
  detect-oce:
    name: detect-oce
    runs-on: ubuntu-latest
    outputs:
      present: ${{ steps.check.outputs.present }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for OCE package
        id: check
        run: |
          if [ -f "packages/onboarding-consent-engine/package.json" ]; then
            echo "present=true" >> $GITHUB_OUTPUT
          else
            echo "present=false" >> $GITHUB_OUTPUT
          fi

  # ── Detect auth-social ────────────────────────────────────────────────────────
  detect-auth-social:
    name: detect-auth-social
    runs-on: ubuntu-latest
    outputs:
      present: ${{ steps.check.outputs.present }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for auth-social package
        id: check
        run: |
          if [ -f "packages/auth-social/package.json" ]; then
            echo "present=true" >> $GITHUB_OUTPUT
          else
            echo "present=false" >> $GITHUB_OUTPUT
          fi

  # ── Ephemeral smoke — onboarding-consent-engine ──────────────────────────────
  smoke-oce:
    name: smoke — onboarding-consent-engine
    runs-on: ubuntu-latest
    needs: [ci, detect-oce]
    if: needs.detect-oce.outputs.present == 'true'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: varshyl_smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/varshyl_smoke
      PORT: 3001
      NODE_ENV: test
      TM_ENCRYPTION_KEY: test-encryption-key-for-ci-only!
      NODE_AUTH_TOKEN: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.0

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build demo-host and all workspace deps
        run: pnpm --filter @varshylinc/demo-host... build

      - name: Start ephemeral demo-host
        run: |
          node apps/demo-host/dist/server/index.js &
          echo "DEMO_HOST_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for /healthz (max 60s)
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/healthz > /dev/null 2>&1; then
              echo "demo-host ready after $((i * 2))s"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: demo-host did not become ready within 60s"
          exit 1

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run smoke — consent-demo flow (ephemeral)
        run: pnpm exec playwright test tests/smoke/onboarding-consent-engine.spec.ts
        env:
          DEMO_HOST_URL: http://localhost:3001

      - name: Upload smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oce-smoke-results
          path: |
            playwright-report/
            test-results/
            qa-evidence/smoke-results.json
          retention-days: 14

  # ── Ephemeral smoke — auth-social ─────────────────────────────────────────────
  smoke-auth-social:
    name: smoke — auth-social
    runs-on: ubuntu-latest
    needs: [ci, detect-auth-social]
    if: needs.detect-auth-social.outputs.present == 'true'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: varshyl_smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/varshyl_smoke
      PORT: 3001
      NODE_ENV: test
      TM_ENCRYPTION_KEY: test-encryption-key-for-ci-only!
      NODE_AUTH_TOKEN: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.0

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build demo-host and all workspace deps
        run: pnpm --filter @varshylinc/demo-host... build

      - name: Start ephemeral demo-host
        run: |
          node apps/demo-host/dist/server/index.js &
          echo "DEMO_HOST_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for /healthz (max 60s)
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/healthz > /dev/null 2>&1; then
              echo "demo-host ready after $((i * 2))s"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: demo-host did not become ready within 60s"
          exit 1

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run smoke — auth-social (ephemeral)
        run: pnpm exec playwright test tests/smoke/auth-social.spec.ts
        env:
          DEMO_HOST_URL: http://localhost:3001

      - name: Upload smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-social-smoke-results
          path: |
            playwright-report/
            test-results/
            qa-evidence/smoke-results.json
          retention-days: 14

  # ── Detect mobile-payments ────────────────────────────────────────────────────
  detect-mobile-payments:
    name: detect-mobile-payments
    runs-on: ubuntu-latest
    outputs:
      present: ${{ steps.check.outputs.present }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for mobile-payments package
        id: check
        run: |
          if [ -f "packages/mobile-payments/package.json" ]; then
            echo "present=true" >> $GITHUB_OUTPUT
          else
            echo "present=false" >> $GITHUB_OUTPUT
          fi

  # ── Ephemeral smoke — mobile-payments ─────────────────────────────────────────
  smoke-mobile-payments:
    name: smoke — mobile-payments
    runs-on: ubuntu-latest
    needs: [ci, detect-mobile-payments]
    if: needs.detect-mobile-payments.outputs.present == 'true'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: varshyl_smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/varshyl_smoke
      PORT: 3001
      NODE_ENV: test
      TM_ENCRYPTION_KEY: test-encryption-key-for-ci-only!
      NODE_AUTH_TOKEN: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.0

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build demo-host and all workspace deps
        run: pnpm --filter @varshylinc/demo-host... build

      - name: Start ephemeral demo-host
        run: |
          node apps/demo-host/dist/server/index.js &
          echo "DEMO_HOST_PID=$!" >> $GITHUB_ENV

      - name: Wait for /healthz (max 60s)
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/healthz > /dev/null 2>&1; then
              echo "demo-host ready after $((i * 2))s"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: demo-host did not become ready within 60s"
          exit 1

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run smoke — mobile-payments (ephemeral)
        run: pnpm exec playwright test tests/smoke/mobile-payments.spec.ts
        env:
          DEMO_HOST_URL: http://localhost:3001

      - name: Upload smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-payments-smoke-results
          path: |
            playwright-report/
            test-results/
            qa-evidence/smoke-results.json
          retention-days: 14

  # ── Pre-publish packaging gate ────────────────────────────────────────────────
  # Cowork: add "pre-publish-check" to main branch required checks on land.
  pre-publish-check:
    name: pre-publish-check
    runs-on: ubuntu-latest
    needs: [ci]

    env:
      NODE_AUTH_TOKEN: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.0

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build all packages (dist/ must exist for exports validation)
        run: pnpm build

      - name: Run packaging checks on changed publishable packages
        run: |
          set -euo pipefail
          mapfile -t CHANGED < <(git diff --name-only origin/main...HEAD \
            | grep '^packages/' | cut -d/ -f2 | sort -u || true)

          PACKAGES=()
          for dir in "${CHANGED[@]}"; do
            [[ -z "$dir" ]] && continue
            if [[ -f "packages/$dir/package.json" ]]; then
              PRIVATE=$(node -p "require('./packages/$dir/package.json').private !== false")
              if [[ "$PRIVATE" == "false" ]]; then
                PACKAGES+=("@varshylinc/$dir")
              fi
            fi
          done

          if [[ ${#PACKAGES[@]} -eq 0 ]]; then
            echo "No publishable package dirs changed — smoke-test rail on known-good packages"
            PACKAGES=("@varshylinc/auth-social" "@varshylinc/mobile-payments")
          fi

          echo "Packages to check: ${PACKAGES[*]}"
          for pkg in "${PACKAGES[@]}"; do
            echo "══════════════════════════════════════"
            echo "pre-publish-check: $pkg"
            bash scripts/prepush-check.sh "$pkg" --packaging-only
          done

name: Release

on:
  push:
    tags:
      - '*-v[0-9]+.[0-9]+.[0-9]+'
      # Soren packages use an npm-style `pkg@X.Y.Z` tag scheme and publish to a
      # different registry (GitHub Packages), handled by the dedicated jobs below.
      - 'soren-core@[0-9]+.[0-9]+.[0-9]+'
      - 'soren-react@[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    # The GitHub Release + npm publish jobs only handle the `*-vX.Y.Z` scheme.
    # Soren `pkg@X.Y.Z` tags are handled by publish-soren-* jobs below.
    if: ${{ !startsWith(github.ref_name, 'soren-core@') && !startsWith(github.ref_name, 'soren-react@') }}

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse tag
        id: tag
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          # Extract package name: everything before the last -vX.Y.Z
          PACKAGE=$(echo "$TAG" | sed 's/-v[0-9]*\.[0-9]*\.[0-9]*$//')
          VERSION=$(echo "$TAG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+$')
          echo "package=$PACKAGE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag: $TAG | Package: $PACKAGE | Version: $VERSION"

      - name: Verify CHANGELOG entry exists
        id: changelog
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          PACKAGE="${{ steps.tag.outputs.package }}"
          VERSION="${{ steps.tag.outputs.version }}"

          # Locate CHANGELOG — packages/<name> or root for toolkit-v* tags
          if [ "$PACKAGE" = "toolkit" ]; then
            CHANGELOG="CHANGELOG.md"
            # Root toolkit tag — no package CHANGELOG required
            echo "notes=Toolkit root release $TAG — see individual package CHANGELOGs." >> $GITHUB_OUTPUT
            exit 0
          fi

          CHANGELOG="packages/$PACKAGE/CHANGELOG.md"

          if [ ! -f "$CHANGELOG" ]; then
            echo "ERROR: $CHANGELOG not found for tag $TAG"
            exit 1
          fi

          # Extract the section for this version from CHANGELOG
          NOTES=$(awk "/^## $VERSION/{found=1; next} found && /^## /{exit} found{print}" "$CHANGELOG")

          if [ -z "$NOTES" ]; then
            echo "ERROR: No CHANGELOG entry found for version $VERSION in $CHANGELOG"
            exit 1
          fi

          echo "CHANGELOG entry found for $VERSION ✓"
          # Write to file to handle multiline
          echo "$NOTES" > /tmp/release_notes.txt
          echo "notes_file=/tmp/release_notes.txt" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body_path: ${{ steps.changelog.outputs.notes_file || '' }}
          body: ${{ steps.changelog.outputs.notes || '' }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.version, '-') }}

  # ── npm publish ──────────────────────────────────────────────────────────────
  # Runs after GitHub Release is created. Publishes every non-private package
  # under @varshylinc to npmjs.com using the NPM_TOKEN repo secret.
  # Skips packages where private:true (demo-host, root).
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: release   # gate: only publish after GitHub Release succeeds

    permissions:
      contents: read
      id-token: write   # required for npm provenance attestation (OIDC → Sigstore)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.0

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build all packages
        run: pnpm -r --filter './packages/*' build

      - name: Publish to npm (public, @varshylinc scope)
        # pnpm publish -r skips packages with private:true automatically.
        # --access public required for first publish of scoped packages.
        # NODE_AUTH_TOKEN is read by npm from the environment — never hardcoded.
        # NPM_CONFIG_PROVENANCE=true instructs npm to attach a Sigstore attestation
        # linking this artifact to its source commit + workflow (displays as
        # "✓ Provenance" badge on the package's npmjs.com page).
        run: pnpm publish -r --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'

  # ── Soren packages — GitHub Packages publish (INERT) ─────────────────────────
  # soren-core and soren-react are currently private:true and publish to GitHub
  # Packages (npm.pkg.github.com), NOT npmjs.com. These jobs mirror the npm
  # publish pattern above but the publish STEP is gated behind the repo variable
  # SOREN_PUBLISH_ENABLED so nothing is published until the registry strategy is
  # finalized. To enable a first publish:
  #   1. Set the package's package.json "private": false
  #   2. Resolve @varshylinc scope ↔ GitHub Packages ownership
  #      (GH Packages requires the scope to match the owning org/user)
  #   3. Set repo variable SOREN_PUBLISH_ENABLED = true
  publish-soren-core:
    name: Publish soren-core (GitHub Packages)
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref_name, 'soren-core@') }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.0

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build soren-core
        run: pnpm --filter @varshylinc/soren-core build

      - name: Publish soren-core (inert until SOREN_PUBLISH_ENABLED=true)
        if: ${{ vars.SOREN_PUBLISH_ENABLED == 'true' }}
        run: pnpm --filter @varshylinc/soren-core publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-soren-react:
    name: Publish soren-react (GitHub Packages)
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref_name, 'soren-react@') }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.0

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build soren-react (+ soren-core dependency)
        run: pnpm --filter @varshylinc/soren-react... build

      - name: Publish soren-react (inert until SOREN_PUBLISH_ENABLED=true)
        if: ${{ vars.SOREN_PUBLISH_ENABLED == 'true' }}
        run: pnpm --filter @varshylinc/soren-react publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
